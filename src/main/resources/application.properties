spring.application.name=UMLmyself

server.port = 8080

spring.datasource.url=jdbc:mysql://localhost:3306/graduation_thesis_system_myself_b?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 显示sql
spring.jpa.show-sql= true
# 格式化
spring.jpa.properties.hibernate.format_sql=true
# 数据库表结构管理
# validate: 只验证表结构，不修改（推荐用于生产环境）
# update: 自动更新表结构（开发环境可用，但可能因数据不兼容导致错误）
# none: 不执行任何操作
spring.jpa.hibernate.ddl-auto=validate

# JWT 配置
# JWT Secret Key（建议在生产环境中使用更复杂的密钥）
jwt.secret=UMLmyselfSecretKeyForJWTTokenGeneration2024
# JWT Token 过期时间（单位：毫秒，默认 7 天 = 604800000）
jwt.expiration=604800000

# Redis 配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=5000ms

# Swagger/OpenAPI 配置
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha