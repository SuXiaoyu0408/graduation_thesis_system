<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕业论文管理系统 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #0f172a;
        }

        .glass-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input {
            width: 100%;
            border: solid 1.5px #cbd5e1;
            border-radius: 0.75rem;
            background: none;
            padding: 1rem;
            padding-right: 3rem;
            font-size: 1rem;
            color: #0f172a;
            transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .user-label {
            position: absolute;
            left: 15px;
            color: #64748b;
            pointer-events: none;
            transform: translateY(1rem);
            transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input:focus,
        .input:valid {
            outline: none;
            border: 1.5px solid #0f172a;
        }

        .input:focus~.user-label,
        .input:valid~.user-label {
            transform: translateY(-50%) scale(0.85);
            background-color: #ffffff;
            padding: 0 .4em;
            color: #0f172a;
            left: 12px;
            font-weight: 600;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s;
            z-index: 10;
        }

        .password-toggle:hover {
            color: #0f172a;
        }

        .checkbox-container {
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .checkbox-container input {
            display: none;
        }

        .checkbox-container svg {
            overflow: visible;
            height: 1.4em;
            width: 1.4em;
            margin-right: 8px;
        }

        .path {
            fill: none;
            stroke: #94a3b8;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke-dasharray 0.5s ease, stroke-dashoffset 0.5s ease;
            stroke-dasharray: 241 9999999;
            stroke-dashoffset: 0;
        }

        .checkbox-container input:checked~svg .path {
            stroke: #0f172a;
            stroke-dasharray: 70.5096664428711 9999999;
            stroke-dashoffset: -262.2723388671875;
        }

        .hidden-form {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-primary {
            width: 100%;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            color: #ffffff;
            background-color: #0f172a;
            font-weight: 700;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #1e293b;
            transform: translateY(-1px);
        }

        .link-text {
            color: #334155;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            border-bottom: 1.5px solid transparent;
            cursor: pointer;
        }

        .link-text:hover {
            color: #020617;
            border-bottom-color: #020617;
        }

        .captcha-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            background-color: #f1f5f9;
            font-size: 0.75rem;
            font-weight: 700;
            color: #0f172a;
            z-index: 10;
        }

        /* --- 顶部消息框样式 --- */
        #topToast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #0f172a;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 200;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #topToast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* --- 遮罩反馈层 --- */
        #statusOverlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .loader-wrapper {
            width: 200px;
            height: 60px;
            position: relative;
            margin-bottom: 20px;
        }

        .loader-circle {
            width: 20px;
            height: 20px;
            position: absolute;
            border-radius: 50%;
            background-color: #0f172a;
            left: 15%;
            transform-origin: 50%;
            animation: circleAnim .5s alternate infinite ease;
        }

        @keyframes circleAnim {
            0% {
                top: 60px;
                height: 5px;
                border-radius: 50px 50px 25px 25px;
                transform: scaleX(1.7);
            }

            40% {
                height: 20px;
                border-radius: 50%;
                transform: scaleX(1);
            }

            100% {
                top: 0%;
            }
        }

        .loader-circle:nth-child(2) {
            left: 45%;
            animation-delay: .2s;
        }

        .loader-circle:nth-child(3) {
            left: auto;
            right: 15%;
            animation-delay: .3s;
        }

        .loader-shadow {
            width: 20px;
            height: 4px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.15);
            position: absolute;
            top: 62px;
            left: 15%;
            filter: blur(1px);
            animation: shadowAnim .5s alternate infinite ease;
        }

        @keyframes shadowAnim {
            0% {
                transform: scaleX(1.5);
            }

            40% {
                transform: scaleX(1);
                opacity: .7;
            }

            100% {
                transform: scaleX(.2);
                opacity: .4;
            }
        }

        .loader-shadow:nth-child(4) {
            left: 45%;
            animation-delay: .2s;
        }

        .loader-shadow:nth-child(5) {
            left: auto;
            right: 15%;
            animation-delay: .3s;
        }

        .status-text {
            font-size: 1rem;
            font-weight: 800;
            color: #0f172a;
            text-align: center;
        }

        .status-icon {
            display: none;
            margin-bottom: 20px;
            color: #059669;
        }
    </style>
</head>

<body>

    <!-- 顶部提示 -->
    <div id="topToast">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
                clip-rule="evenodd" />
        </svg>
        <span id="toastText">验证码已发送</span>
    </div>

    <!-- 遮罩反馈层 -->
    <div id="statusOverlay">
        <div id="animGroup" class="loader-wrapper">
            <div class="loader-circle"></div>
            <div class="loader-circle"></div>
            <div class="loader-circle"></div>
            <div class="loader-shadow"></div>
            <div class="loader-shadow"></div>
            <div class="loader-shadow"></div>
        </div>
        <div id="successIcon" class="status-icon">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <div id="statusMsg" class="status-text">处理中...</div>
    </div>

    <div class="w-full max-w-md p-6">
        <div class="glass-card p-10">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">毕业论文管理系统</h1>
                <p class="text-slate-500 text-sm mt-3 font-medium" id="formSubtitle">请登录您的账号</p>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="fade-in" novalidate>
                <div class="input-group">
                    <input required type="text" id="loginUser" autocomplete="off" class="input">
                    <label class="user-label">用户名 / 手机号</label>
                </div>
                <div class="input-group">
                    <input required type="password" id="loginPass" autocomplete="off" class="input">
                    <label class="user-label">密码</label>
                    <div class="password-toggle" onclick="togglePassword('loginPass')">
                        <svg id="eye-loginPass" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.888 9.888L2 2m20 20L14.111 14.111" />
                        </svg>
                    </div>
                </div>

                <div class="flex items-center justify-between mb-8">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember">
                        <svg viewBox="0 0 64 64">
                            <path
                                d="M 0 16 V 56 A 8 8 90 0 0 8 64 H 56 A 8 8 90 0 0 64 56 V 8 A 8 8 90 0 0 56 0 H 8 A 8 8 90 0 0 0 8 V 16 L 32 48 L 64 16 V 8 A 8 8 90 0 0 56 0 H 8 A 8 8 90 0 0 0 8 V 56 A 8 8 90 0 0 8 64 H 56 A 8 8 90 0 0 64 56 V 16"
                                pathLength="575.0541381835938" class="path"></path>
                        </svg>
                        <span class="text-sm text-slate-600 font-medium">记住我</span>
                    </label>
                    <a onclick="switchForm('forgot')" class="link-text text-sm">忘记密码？</a>
                </div>
                <button type="submit" class="btn-primary">立即登录</button>
            </form>

            <!-- 找回密码流程 -->
            <form id="forgotForm" class="hidden-form fade-in" novalidate>
                <div class="input-group"><input required type="tel" id="forgotPhone" class="input"><label
                        class="user-label">手机号</label></div>
                <div id="captchaWrap" class="hidden-form">
                    <div class="input-group">
                        <input required type="text" id="captchaCode" class="input"><label class="user-label">验证码</label>
                        <button type="button" id="captchaBtn" onclick="sendCaptcha()" class="captcha-btn">获取验证码</button>
                    </div>
                </div>
                <button type="button" id="forgotActionBtn" onclick="handleForgot()" class="btn-primary">发送验证码</button>
                <p class="text-center text-sm text-slate-500 mt-8"><a onclick="switchForm('login')"
                        class="link-text">返回登录</a></p>
            </form>

            <!-- 角色选择表单 -->
            <form id="roleSelectionForm" class="hidden-form fade-in" novalidate>
                <div class="text-center mb-6">
                    <h2 class="text-xl font-bold text-slate-900">选择角色</h2>
                    <p class="text-slate-500 text-sm mt-1">请选择您要登录的角色</p>
                </div>
                <div id="roleList" class="space-y-3 mb-6">
                    <!-- 角色列表将动态渲染在此处 -->
                </div>
                <button type="submit" class="btn-primary" id="confirmRoleBtn" disabled>确认角色</button>
                <p class="text-center text-sm text-slate-500 mt-6"><a onclick="switchForm('login')"
                        class="link-text">返回登录</a></p>
            </form>

            <!-- 重置密码表单 -->
            <form id="resetForm" class="hidden-form fade-in" novalidate>
                <div class="input-group">
                    <input required type="password" id="newPass" class="input">
                    <label class="user-label">新密码</label>
                    <div class="password-toggle" onclick="togglePassword('newPass')">
                        <svg id="eye-newPass" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.888 9.888L2 2m20 20L14.111 14.111" />
                        </svg>
                    </div>
                </div>
                <div class="input-group">
                    <input required type="password" id="confirmNewPass" class="input">
                    <label class="user-label">确认新密码</label>
                    <div class="password-toggle" onclick="togglePassword('confirmNewPass')">
                        <svg id="eye-confirmNewPass" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.888 9.888L2 2m20 20L14.111 14.111" />
                        </svg>
                    </div>
                </div>
                <button type="submit" class="btn-primary">确认重置密码</button>
            </form>
        </div>
        <p class="text-center text-xs text-slate-400 mt-8 font-medium">&copy; 2025 毕业论文管理系统</p>
    </div>

    <script>
        const forms = {
            login: document.getElementById('loginForm'),
            //register: document.getElementById('registerForm'),
            forgot: document.getElementById('forgotForm'),
            reset: document.getElementById('resetForm'),
            roleSelection: document.getElementById('roleSelectionForm')
        };
        
        // 临时存储登录信息
        let tempLoginData = null;
        // 临时存储找回密码的手机号
        let forgotPasswordPhone = null;
        
        // 页面加载时，检查是否有保存的用户名
        function loadRememberedCredentials() {
            const rememberedUsername = localStorage.getItem('rememberedUsername');
            
            if (rememberedUsername) {
                // 只填充用户名，不填充密码（安全考虑）
                const usernameInput = document.getElementById('loginUser');
                const rememberCheckbox = document.getElementById('remember');
                
                if (usernameInput) {
                    usernameInput.value = rememberedUsername;
                }
                if (rememberCheckbox) {
                    rememberCheckbox.checked = true;
                }
            }
        }
        
        // 页面加载完成后执行
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadRememberedCredentials);
        } else {
            loadRememberedCredentials();
        }
        
        const statusOverlay = document.getElementById('statusOverlay');
        const animGroup = document.getElementById('animGroup');
        const successIcon = document.getElementById('successIcon');
        const statusMsg = document.getElementById('statusMsg');
        const topToast = document.getElementById('topToast');
        const toastText = document.getElementById('toastText');

        const EYE_OPEN = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
        const EYE_CLOSED = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.888 9.888L2 2m20 20L14.111 14.111" />`;

        function showToast(text) {
            toastText.innerText = text;
            topToast.classList.add('show');
            setTimeout(() => topToast.classList.remove('show'), 3000);
        }

        function showFeedback(text, isSuccess = false, duration = null) {
            statusOverlay.style.display = 'flex';
            statusMsg.innerText = text;
            if (isSuccess) {
                animGroup.style.display = 'none';
                successIcon.style.display = 'block';
            } else {
                animGroup.style.display = 'block';
                successIcon.style.display = 'none';
            }
            if (duration) setTimeout(() => statusOverlay.style.display = 'none', duration);
        }

        function togglePassword(id) {
            const input = document.getElementById(id);
            const eye = document.getElementById('eye-' + id);
            if (input.type === 'password') {
                input.type = 'text';
                eye.innerHTML = EYE_OPEN;
            } else {
                input.type = 'password';
                eye.innerHTML = EYE_CLOSED;
            }
        }

        function switchForm(type) {
            Object.values(forms).forEach(f => f.classList.add('hidden-form'));
            forms[type].classList.remove('hidden-form');
            const titles = {
                login: '欢迎回来，请登录您的账号',
                //register: '新用户注册系统',
                forgot: '手机号找回密码',
                reset: '重置您的账户密码',
                roleSelection: '请选择角色'
            };
            document.getElementById('formSubtitle').innerText = titles[type];
            
            // 如果切换到注册表单，重置角色选择
            if(type === 'register') {
                resetRoleSelection();
            }
            
            // 如果切换到登录页面，重置忘记密码表单
            if(type === 'login') {
                resetForgotPasswordForm();
            }
            
            // 如果切换到忘记密码表单，显示验证码输入框
            if(type === 'forgot') {
                const wrap = document.getElementById('captchaWrap');
                if (wrap) {
                    wrap.classList.remove('hidden-form');
                }
                // 重置按钮文本
                const actionBtn = document.getElementById('forgotActionBtn');
                if (actionBtn) {
                    actionBtn.innerText = '立即验证';
                }
            }
        }
        
        // 重置忘记密码表单
        function resetForgotPasswordForm() {
            // 清空手机号输入框
            const phoneInput = document.getElementById('forgotPhone');
            if (phoneInput) {
                phoneInput.value = '';
            }
            
            // 清空验证码输入框
            const codeInput = document.getElementById('captchaCode');
            if (codeInput) {
                codeInput.value = '';
            }
            
            // 重置获取验证码按钮
            const captchaBtn = document.getElementById('captchaBtn');
            if (captchaBtn) {
                captchaBtn.disabled = false;
                captchaBtn.innerText = '获取验证码';
            }
            
            // 重置立即验证按钮文本
            const actionBtn = document.getElementById('forgotActionBtn');
            if (actionBtn) {
                actionBtn.innerText = '立即验证';
            }
            
            // 清空保存的手机号
            forgotPasswordPhone = null;
        }

        // 渲染角色选择页面
        function renderRoleSelection(roles) {
            const roleList = document.getElementById('roleList');
            roleList.innerHTML = '';
            
            roles.forEach(role => {
                const roleItem = document.createElement('div');
                roleItem.className = 'role-item border border-slate-200 rounded-lg p-3 cursor-pointer hover:bg-slate-50 transition-colors';
                roleItem.innerHTML = `
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="selectedRole" value="${role.roleId}" class="mr-3 role-radio" data-role-code="${role.roleCode}">
                        <div>
                            <p class="font-medium text-slate-800">${role.roleName}</p>
                            <p class="text-xs text-slate-500">${role.roleCode}</p>
                        </div>
                    </label>
                `;
                
                // 添加点击事件
                roleItem.addEventListener('click', function() {
                    // 取消其他选择
                    document.querySelectorAll('.role-item').forEach(item => {
                        item.classList.remove('border-indigo-500', 'bg-indigo-50');
                    });
                    
                    // 选中当前项
                    this.classList.add('border-indigo-500', 'bg-indigo-50');
                    const radio = this.querySelector('.role-radio');
                    radio.checked = true;
                    
                    // 启用确认按钮
                    document.getElementById('confirmRoleBtn').disabled = false;
                });
                
                roleList.appendChild(roleItem);
            });
        }

        // 重置角色选择
        function resetRoleSelection() {
            document.querySelectorAll('.role-checkbox').forEach(cb => {
                cb.checked = false;
            });
            document.getElementById('defenseOptions')?.classList.add('hidden');
        }

        forms.login.onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const remember = document.getElementById('remember').checked;
            
            if(!user || !pass) {
                showToast("请输入用户名和密码");
                return;
            }
            
            showFeedback("正在登录...");
            
            try {
                // 调用后端登录接口，获取用户角色列表
                const response = await fetch('http://localhost:8080/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: user,
                        password: pass
                    })
                });
                
                const data = await response.json();
                
                if(data.code === 200) {
                    // 处理"记住我"功能
                    if (remember) {
                        // 如果选中"记住我"，只保存用户名到localStorage（不存储密码）
                        localStorage.setItem('rememberedUsername', user);
                    } else {
                        // 如果未选中"记住我"，清除保存的用户名
                        localStorage.removeItem('rememberedUsername');
                    }
                    
                    const roles = data.data.roles;
                    tempLoginData = {
                        userId: data.data.userId,
                        username: data.data.username
                    };
                    
                    if(roles && roles.length > 0) {
                        // 关闭登录等待遮罩层
                        statusOverlay.style.display = 'none';
                        
                        if(roles.length === 1) {
                            // 只有一个角色，自动选择该角色
                            const role = roles[0];
                            // 修复：确保传递 roleCode，而不是 roleId
                            await confirmRole(tempLoginData.userId, role.roleCode);
                        } else {
                            // 多个角色，显示角色选择页面
                            renderRoleSelection(roles);
                            switchForm('roleSelection');
                        }
                    } else {
                        showFeedback("用户未分配角色，请联系管理员", false, 2000);
                    }
                } else {
                    // 登录失败 - 根据API文档处理错误
                    showFeedback(data.message || "登录失败", false, 2000);
                }
            } catch (error) {
                console.error('Login error:', error);
                showFeedback("网络错误，请稍后重试", false, 2000);
            }
        };

        // 角色选择表单提交
        forms.roleSelection.onsubmit = async (e) => {
            e.preventDefault();

            // 1. 使用更精确的选择器，确保只在角色列表内部查找
            const selectedRadio = document.querySelector('#roleList input[name="selectedRole"]:checked');
            if (!selectedRadio) {
                showToast("请选择一个角色");
                return;
            }

            const roleCode = selectedRadio.dataset.roleCode;

            // 2. 添加调试日志，在提交前打印获取到的角色代码
            console.log('[RoleSelection Submit] Submitting with roleCode:', roleCode);

            showFeedback("正在确认角色...");

            try {
                await confirmRole(tempLoginData.userId, roleCode);
            } catch (error) {
                console.error('Role selection error:', error);
                showFeedback("确认角色失败，请重试", false, 2000);
            }
        };

        // 确认角色并获取JWT token
        async function confirmRole(userId, roleCode) {
            try {
                const response = await fetch('http://localhost:8080/login/confirm-role', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: userId,
                        roleCode: roleCode
                    })
                });
                
                const data = await response.json();
                
                if(data.code === 200) {
                    // 登录成功，保存JWT token和用户信息（从后端响应中获取）
                    // 清理token中的非法字符（JWT字符串只能包含Base64URL字符）
                    let token = (data.data.token || '').toString();
                    
                    // 去除首尾空白字符
                    token = token.trim();
                    
                    // 移除所有控制字符（ASCII 0-31）和删除字符（127）
                    token = token.replace(/[\x00-\x1F\x7F]/g, '');
                    
                    // 移除所有空白字符
                    token = token.replace(/\s+/g, '');
                    
                    // 只保留Base64URL字符和点号
                    token = token.replace(/[^A-Za-z0-9\-_.]/g, '');
                    
                    // 验证 token 不为空
                    if (!token) {
                        showFeedback('登录失败：Token 无效', 'error');
                        return;
                    }
                    
                    const username = data.data.username;
                    const roleCode = data.data.roleCode;
                    
                    localStorage.setItem('token', token);
                    localStorage.setItem('userId', data.data.userId);
                    localStorage.setItem('username', username);
                    localStorage.setItem('roleId', data.data.roleId);
                    localStorage.setItem('roleCode', roleCode);
                    
                    // 关闭加载动画
                    statusOverlay.style.display = 'none';
                    // 显示登录成功提示（使用顶部Toast，与其他提示一致）
                    showFeedback("登录成功！正在跳转...");
                    
                    // 根据角色代码跳转到相应页面
                    setTimeout(() => {
                        window.location.href = `management_system.html?role=${roleCode}`;
                    }, 500);
                } else {
                    showFeedback(data.message || "确认角色失败", false, 2000);
                }
            } catch (error) {
                console.error('Confirm role error:', error);
                showFeedback("网络错误，请稍后重试", false, 2000);
            }
        }

        // 发送验证码
        async function sendCaptcha() {
            const phone = document.getElementById('forgotPhone').value;
            
            // 校验手机号格式
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                showToast("请输入有效的手机号");
                return;
            }
            
            const btn = document.getElementById('captchaBtn');
            btn.disabled = true;
            
            try {
                const response = await fetch('http://localhost:8080/password/sms-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone: phone
                    })
                });
                
                const data = await response.json();
                
                if (data.code === 200) {
                    showToast("验证码已发送");
                    // 开始倒计时
                    let count = 60;
                    const timer = setInterval(() => {
                        count--;
                        btn.innerText = count + "s";
                        if (count <= 0) {
                            clearInterval(timer);
                            btn.disabled = false;
                            btn.innerText = "获取验证码";
                        }
                    }, 1000);
                } else {
                    showToast(data.message || "发送验证码失败");
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Send captcha error:', error);
                showToast("网络错误，请稍后重试");
                btn.disabled = false;
            }
        }

        async function handleForgot() {
            const phone = document.getElementById('forgotPhone').value;
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast("请输入有效的手机号");
                return;
            }
            
            // 校验验证码
            const code = document.getElementById('captchaCode').value;
            if (!code || code.trim() === '') {
                showToast("请输入验证码");
                return;
            }
            
            showFeedback("正在校验验证码...");
            
            try {
                const response = await fetch('http://localhost:8080/password/verify-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone: phone,
                        code: code
                    })
                });
                
                const data = await response.json();
                
                if (data.code === 200) {
                    // 保存手机号，用于重置密码
                    forgotPasswordPhone = phone;
                    // 关闭加载动画
                    statusOverlay.style.display = 'none';
                    // 跳转到重置密码页面
                    switchForm('reset');
                } else {
                    showFeedback(data.message || "校验验证码失败", false, 2000);
                }
            } catch (error) {
                console.error('Verify code error:', error);
                showFeedback("网络错误，请稍后重试", false, 2000);
            }
        }

        forms.reset.onsubmit = async (e) => {
            e.preventDefault();
            const pass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmNewPass').value;
            
            // 前端基础校验
            if (!pass || !confirm) {
                showToast("请输入新密码和确认密码");
                return;
            }
            
            if (pass !== confirm) {
                showToast("两次输入的密码不一致");
                return;
            }
            
            // 检查是否有保存的手机号
            if (!forgotPasswordPhone) {
                showToast("请先完成验证码校验");
                return;
            }
            
            showFeedback("正在修改密码...");
            
            try {
                const response = await fetch('http://localhost:8080/password/reset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phone: forgotPasswordPhone,
                        newPassword: pass,
                        confirmPassword: confirm
                    })
                });
                
                const data = await response.json();
                
                if (data.code === 200) {
                    // 关闭加载动画
                    statusOverlay.style.display = 'none';
                    // 显示成功提示
                    showToast("密码重置成功，请重新登录");
                    // 清空表单
                    e.target.reset();
                    // 清空保存的手机号
                    forgotPasswordPhone = null;
                    // 延迟跳转到登录页面
                    setTimeout(() => {
                        switchForm('login');
                    }, 1500);
                } else {
                    showFeedback(data.message || "重置密码失败", false, 2000);
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showFeedback("网络错误，请稍后重试", false, 2000);
            }
        };
    </script>
</body>
